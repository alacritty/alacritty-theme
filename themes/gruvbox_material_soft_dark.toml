# Colors (Gruvbox Material Soft Dark)
# *corresponding to VS Code theme of the same name

[colors.primary]
background        = "#32302f"    # colors.editor.background
foreground        = "#d4be98"    # colors.editor.foreground
dim_foreground    = "#d4be98"    # colors.terminal.ansiWhite
bright_foreground = "#ddc7a1"    # colors.terminal.ansiBrightWhite

[colors.cursor]
text   = "#3c3836"               # colors.terminal.ansiBlack
cursor = "#d4be98"               # colors.editorCursor.foreground

[colors.vi_mode_cursor]
text   = "#3c3836"               # colors.terminal.ansiBlack
cursor = "#d4be98"               # colors.editorCursor.foreground

[colors.search.matches]
foreground = "CellForeground"
background = "#41493d"           # colors.editor.findMatchHighlightBackground (transparency considered)

[colors.search.focused_match]
foreground = "CellForeground"
background = "#523936"           # colors.editor.findMatchBackground (transparency considered)

[colors.hints.start]
foreground = "#7daea3"           # colors.editorHint.foreground
background = "#45403d"           # colors.editorWidget.background

[colors.hints.end]
foreground = "#7daea3"           # colors.editorHint.foreground
background = "#45403d"           # colors.editorWidget.background

[colors.line_indicator]
foreground = "#7c6f64"           # colors.editorLineNumber.foreground
background = "#32302f"           # colors.editor.background

[colors.footer_bar]
foreground = "#a89984"           # colors.statusBar.foreground
background = "#292828"           # colors.statusBar.background

[colors.selection]
foreground = "CellForeground"
background = "#534c46"           # colors.selection.background (transparency considered)

[colors.normal]
black   = "#3c3836"              # colors.terminal.ansiBlack
red     = "#ea6962"              # colors.terminal.ansiRed
green   = "#a9b665"              # colors.terminal.ansiGreen
yellow  = "#d8a657"              # colors.terminal.ansiYellow
blue    = "#7daea3"              # colors.terminal.ansiBlue
magenta = "#d3869b"              # colors.terminal.ansiMagenta
cyan    = "#89b482"              # colors.terminal.ansiCyan
white   = "#d4be98"              # colors.terminal.ansiWhite

[colors.bright]
black   = "#928374"              # colors.terminal.ansiBrightBlack
red     = "#ea6962"              # colors.terminal.ansiBrightRed
green   = "#a9b665"              # colors.terminal.ansiBrightGreen
yellow  = "#d8a657"              # colors.terminal.ansiBrightYellow
blue    = "#7daea3"              # colors.terminal.ansiBrightBlue
magenta = "#d3869b"              # colors.terminal.ansiBrightMagenta
cyan    = "#89b482"              # colors.terminal.ansiBrightCyan
white   = "#ddc7a1"              # colors.terminal.ansiBrightWhite

[colors.dim]
black   = "#3c3836"              # colors.terminal.ansiBlack
red     = "#ea6962"              # colors.terminal.ansiRed
green   = "#a9b665"              # colors.terminal.ansiGreen
yellow  = "#d8a657"              # colors.terminal.ansiYellow
blue    = "#7daea3"              # colors.terminal.ansiBlue
magenta = "#d3869b"              # colors.terminal.ansiMagenta
cyan    = "#89b482"              # colors.terminal.ansiCyan
white   = "#d4be98"              # colors.terminal.ansiWhite

[bell]
color = "#45403d"                # colors.notifications.background
